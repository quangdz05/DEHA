<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quên mật khẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <main class="page section section-muted">
    <div class="container">
      <div id="messages"></div>
      <div class="auth-card">
        <div>
          <h1 class="fw-bold">Quên mật khẩu</h1>
          <p class="text-muted small">Nhập địa chỉ email của bạn để nhận liên kết đặt lại mật khẩu.</p>
          <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
            <label class="form-label mt-3">Email</label>
            <input class="form-control" type="email" name="email" required placeholder="name@example.com">
            <button class="btn btn-brand w-100 mt-4" id="submitBtn">Gửi yêu cầu</button>
          </form>
          <p class="mt-4 text-center mb-0"><a href="login.html" class="text-secondary small">Quay lại đăng nhập</a></p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    async function handleForgotPassword(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = document.getElementById("submitBtn");
      const email = form.email.value.trim();
      
      submitBtn.disabled = true;
      submitBtn.textContent = "Đang gửi...";
      
      try {
        const response = await apiFetch("/auth/forgot-password/", {
          method: "POST",
          body: JSON.stringify({ email })
        });
        showAlert(response.message || "Yêu cầu đã được gửi thành công. Vui lòng kiểm tra email của bạn.", "success");
        form.reset();
      } catch (error) {
        showAlert(error.message || "Đã xảy ra lỗi. Vui lòng thử lại sau.", "danger");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Gửi yêu cầu";
      }
    }
  </script>
</body>
</html>
