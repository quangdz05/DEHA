<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quên mật khẩu - Gym Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .auth-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .auth-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(17, 24, 39, .12);
    }
    .back-link {
      transition: color 0.2s ease, transform 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>
  <main class="page section section-muted d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 0;">
    <div class="container">
      <div id="messages" class="mb-3 mx-auto" style="max-width: 500px;"></div>
      <div class="auth-card p-4 p-md-5" style="max-width: 500px;">
        <div class="text-center mb-4">
          <img class="brand-logo mb-3" src="assets/images/logo.png" alt="Gym Booking" style="width: 54px; height: 54px; border-radius: 12px;">
          <h2 class="fw-bold mb-1">Gym Booking</h2>
          <p class="text-muted small">Giải pháp quản lý phòng tập thông minh</p>
        </div>
        
        <div>
          <h4 class="fw-bold text-center mb-3">Quên mật khẩu?</h4>
          <p class="text-muted text-center small mb-4">Nhập địa chỉ email đã đăng ký của bạn. Hệ thống sẽ gửi cho bạn liên kết khôi phục mật khẩu bảo mật.</p>
          
          <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
            <div class="mb-3">
              <label class="form-label fw-bold small"><i class="bi bi-envelope me-1"></i>Địa chỉ Email</label>
              <input class="form-control" type="email" name="email" required placeholder="name@example.com">
            </div>
            <button class="btn btn-brand w-100 mt-3 py-2 fw-bold" id="submitBtn">
              Gửi liên kết khôi phục <i class="bi bi-arrow-right ms-1"></i>
            </button>
          </form>
          
          <p class="mt-4 text-center mb-0">
            <a href="login.html" class="text-secondary small back-link">
              <i class="bi bi-arrow-left"></i> Quay lại đăng nhập
            </a>
          </p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js?v=1.0.3"></script>
  <script>
    async function handleForgotPassword(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = document.getElementById("submitBtn");
      const email = form.email.value.trim();
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Đang gửi yêu cầu...';
      
      try {
        const response = await apiFetch("/auth/forgot-password/", {
          method: "POST",
          body: JSON.stringify({ email })
        });
        showAlert(response.message || "Yêu cầu đặt lại mật khẩu đã được gửi! Vui lòng kiểm tra email của bạn.", "success");
        form.reset();
      } catch (error) {
        showAlert(error.message || "Đã xảy ra lỗi khi gửi yêu cầu. Vui lòng thử lại sau.", "danger");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Gửi liên kết khôi phục <i class="bi bi-arrow-right ms-1"></i>';
      }
    }
  </script>
</body>
</html>
