<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <main class="page section section-muted">
    <div class="container">
      <div id="messages"></div>
      <div class="auth-card">
        <h1 class="fw-bold">Đăng nhập</h1>
        <form onsubmit="handleLogin(event)">
          <label class="form-label mt-3">Username</label>
          <input class="form-control" name="username" required>
          <label class="form-label mt-3">Mật khẩu</label>
          <input class="form-control" type="password" name="password" required>
          <button class="btn btn-brand w-100 mt-4">Đăng nhập</button>
        </form>
        <p class="mt-3 text-center">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
