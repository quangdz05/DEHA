<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <main class="page section section-muted">
    <div class="container">
      <div id="messages"></div>
      <div class="auth-card">
        <div id="loginFormSection">
          <h1 class="fw-bold">Đăng nhập</h1>
          <form onsubmit="handleLogin(event)">
            <label class="form-label mt-3">Username</label>
            <input class="form-control" name="username" required>
            <label class="form-label mt-3">Mật khẩu</label>
            <input class="form-control" type="password" name="password" required>
            <button class="btn btn-brand w-100 mt-4">Đăng nhập</button>
          </form>
          <p class="mt-3 text-center">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
          <p class="text-center mt-2 mb-0"><a href="forgot-password.html" class="text-secondary small">Quên mật khẩu?</a></p>
        </div>
        <div id="twoFactorSection" class="d-none">
          <h1 class="fw-bold">Xác thực 2 lớp</h1>
          <p class="text-muted small">Nhập mã OTP 6 số từ ứng dụng xác thực của bạn (Google Authenticator).</p>
          <form onsubmit="handle2FAVerify(event)">
            <input type="hidden" id="twoFactorUserId">
            <label class="form-label mt-3">Mã xác thực OTP</label>
            <input class="form-control text-center fs-4" name="code" pattern="\d{6}" maxlength="6" placeholder="000000" required autocomplete="off">
            <button class="btn btn-brand w-100 mt-4">Xác nhận</button>
          </form>
          <p class="mt-3 text-center"><a href="#" onclick="cancel2FA(event)" class="text-secondary small">Quay lại</a></p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js?v=1.0.3"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
