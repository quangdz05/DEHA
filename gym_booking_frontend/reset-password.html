<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đặt lại mật khẩu - Gym Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .auth-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .auth-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(17, 24, 39, .12);
    }
    .status-icon-box {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <main class="page section section-muted d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 0;">
    <div class="container">
      <div id="messages" class="mb-3 mx-auto" style="max-width: 500px;"></div>
      <div class="auth-card p-4 p-md-5" style="max-width: 500px;">
        <div class="text-center mb-4">
          <img class="brand-logo mb-3" src="assets/images/logo.png" alt="Gym Booking" style="width: 54px; height: 54px; border-radius: 12px;">
          <h2 class="fw-bold mb-1">Gym Booking</h2>
          <p class="text-muted small">Giải pháp quản lý phòng tập thông minh</p>
        </div>
        
        <div id="resetFormSection">
          <h4 class="fw-bold text-center mb-3">Đặt lại mật khẩu</h4>
          <p class="text-muted text-center small mb-4">Nhập mật khẩu mới cho tài khoản của bạn. Mật khẩu phải có độ dài tối thiểu là 8 ký tự.</p>
          
          <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
            <div class="mb-3">
              <label class="form-label fw-bold small"><i class="bi bi-lock me-1"></i>Mật khẩu mới</label>
              <input class="form-control" type="password" name="password" id="password" required minlength="8" placeholder="Tối thiểu 8 ký tự">
            </div>
            
            <div class="mb-3">
              <label class="form-label fw-bold small"><i class="bi bi-shield-check me-1"></i>Xác nhận mật khẩu</label>
              <input class="form-control" type="password" name="password_confirm" id="password_confirm" required minlength="8" placeholder="Nhập lại mật khẩu mới">
            </div>
            
            <button class="btn btn-brand w-100 mt-4 py-2 fw-bold" id="submitBtn">
              Đặt lại mật khẩu <i class="bi bi-check-circle ms-1"></i>
            </button>
          </form>
        </div>
        
        <div id="errorSection" class="d-none text-center py-3">
          <div class="status-icon-box bg-danger-subtle text-danger mb-3">
            <i class="bi bi-x-circle-fill fs-2"></i>
          </div>
          <h4 class="fw-bold text-danger mb-2">Liên kết không hợp lệ</h4>
          <p class="text-muted small mb-4" id="errorMessage">Đường dẫn khôi phục mật khẩu đã hết hạn hoặc không chính xác.</p>
          <p class="mb-0"><a href="login.html" class="btn btn-outline-secondary w-100 fw-bold">Quay lại đăng nhập</a></p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js?v=1.0.3"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const uid = params.get("uid");
    const token = params.get("token");

    document.addEventListener("DOMContentLoaded", () => {
      if (!uid || !token) {
        document.getElementById("resetFormSection").classList.add("d-none");
        document.getElementById("errorSection").classList.remove("d-none");
        document.getElementById("errorMessage").textContent = "Thiếu thông tin xác thực từ đường dẫn khôi phục mật khẩu. Vui lòng thử lại.";
      }
    });

    async function handleResetPassword(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = document.getElementById("submitBtn");
      const password = form.password.value;
      const passwordConfirm = form.password_confirm.value;

      if (password !== passwordConfirm) {
        showAlert("Mật khẩu xác nhận không khớp.", "danger");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Đang xử lý...';

      try {
        const response = await apiFetch("/auth/reset-password/", {
          method: "POST",
          body: JSON.stringify({
            uid: uid,
            token: token,
            new_password: password
          })
        });
        
        document.getElementById("resetFormSection").innerHTML = `
          <div class="text-center py-3">
            <div class="status-icon-box bg-success-subtle text-success mb-3">
              <i class="bi bi-check-circle-fill fs-2"></i>
            </div>
            <h4 class="fw-bold text-success mb-2">Thành công</h4>
            <p class="text-muted small mb-4">Mật khẩu của bạn đã được cập nhật thành công. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.</p>
            <a href="login.html" class="btn btn-brand w-100 fw-bold py-2">Đăng nhập ngay</a>
          </div>
        `;
      } catch (error) {
        showAlert(error.message || "Đã xảy ra lỗi khi đặt lại mật khẩu. Vui lòng thử lại sau.", "danger");
      } finally {
        if (document.getElementById("submitBtn")) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Đặt lại mật khẩu <i class="bi bi-check-circle ms-1"></i>';
        }
      }
    }
  </script>
</body>
</html>
