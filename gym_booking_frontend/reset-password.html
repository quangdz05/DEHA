<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đặt lại mật khẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <main class="page section section-muted">
    <div class="container">
      <div id="messages"></div>
      <div class="auth-card">
        <div id="resetFormSection">
          <h1 class="fw-bold">Đặt lại mật khẩu</h1>
          <p class="text-muted small">Nhập mật khẩu mới cho tài khoản của bạn. Mật khẩu phải có ít nhất 8 ký tự.</p>
          <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
            <label class="form-label mt-3">Mật khẩu mới</label>
            <input class="form-control" type="password" name="password" id="password" required minlength="8" placeholder="Nhập mật khẩu mới">
            
            <label class="form-label mt-3">Xác nhận mật khẩu</label>
            <input class="form-control" type="password" name="password_confirm" id="password_confirm" required minlength="8" placeholder="Nhập lại mật khẩu mới">
            
            <button class="btn btn-brand w-100 mt-4" id="submitBtn">Đặt lại mật khẩu</button>
          </form>
        </div>
        <div id="errorSection" class="d-none text-center">
          <h1 class="fw-bold text-danger">Lỗi</h1>
          <p class="text-muted" id="errorMessage">Yêu cầu không hợp lệ hoặc thiếu thông tin cần thiết.</p>
          <p class="mt-4"><a href="login.html" class="btn btn-outline-secondary">Quay lại đăng nhập</a></p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const uid = params.get("uid");
    const token = params.get("token");

    document.addEventListener("DOMContentLoaded", () => {
      if (!uid || !token) {
        document.getElementById("resetFormSection").classList.add("d-none");
        document.getElementById("errorSection").classList.remove("d-none");
        document.getElementById("errorMessage").textContent = "Thiếu thông tin xác thực từ đường dẫn khôi phục mật khẩu.";
      }
    });

    async function handleResetPassword(event) {
      event.preventDefault();
      const form = event.target;
      const submitBtn = document.getElementById("submitBtn");
      const password = form.password.value;
      const passwordConfirm = form.password_confirm.value;

      if (password !== passwordConfirm) {
        showAlert("Mật khẩu nhập lại không khớp.", "danger");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Đang xử lý...";

      try {
        const response = await apiFetch("/auth/reset-password/", {
          method: "POST",
          body: JSON.stringify({
            uid: uid,
            token: token,
            new_password: password
          })
        });
        
        showAlert(response.message || "Đặt lại mật khẩu thành công!", "success");
        document.getElementById("resetFormSection").innerHTML = `
          <h3 class="fw-bold text-success text-center">Thành công</h3>
          <p class="text-muted text-center mt-3">Mật khẩu của bạn đã được thay đổi thành công. Bạn có thể sử dụng mật khẩu mới để đăng nhập.</p>
          <p class="mt-4 text-center mb-0"><a href="login.html" class="btn btn-brand w-100">Đăng nhập ngay</a></p>
        `;
      } catch (error) {
        showAlert(error.message || "Không thể đặt lại mật khẩu. Vui lòng kiểm tra lại liên kết hoặc thử lại.", "danger");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Đặt lại mật khẩu";
      }
    }
  </script>
</body>
</html>
