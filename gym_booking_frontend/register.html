<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
</head>

<body>
  <main class="page section section-muted">
    <div class="container">
      <div id="messages"></div>
      <div class="auth-card">
        <h1 class="fw-bold">Đăng ký</h1>
        <form onsubmit="handleRegister(event)">
          <label class="form-label mt-3">Họ tên</label><input class="form-control" name="full_name" required>
          <label class="form-label mt-3">Username</label><input class="form-control" name="username" required>
          <label class="form-label mt-3">Email</label><input class="form-control" type="email" name="email">
          <label class="form-label mt-3">Mật khẩu</label><input class="form-control" type="password" name="password"
            required>
          <label class="form-label mt-3">Nhập lại mật khẩu</label><input class="form-control" type="password"
            name="password_confirm" required>
          <input type="hidden" name="role" value="member">
          <button class="btn btn-brand w-100 mt-4">Đăng ký</button>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
