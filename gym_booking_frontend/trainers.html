<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Huấn luyện viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body onload="loadTrainers()">
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><img class="brand-logo" src="assets/images/logo.png" alt="">Gym Booking</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav" aria-label="Mở menu"><span class="navbar-toggler-icon"></span></button>
      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="classes.html">Lớp tập</a></li>
          <li class="nav-item"><a class="nav-link active" href="trainers.html">HLV</a></li>
          <li class="nav-item"><a class="nav-link" href="packages.html">Gói tập</a></li>
          <li class="nav-item d-none" data-role="member"><a class="nav-link" href="my-bookings.html">Lịch của tôi</a></li>
          <li class="nav-item d-none" data-role="trainer,admin"><a class="nav-link" href="trainer-dashboard.html">Lịch dạy HLV</a></li>
          <li class="nav-item d-none" data-role="admin"><a class="nav-link" href="admin-dashboard.html">Quản lý Admin</a></li>
          <li class="nav-item" data-auth="guest"><a class="nav-link" href="login.html">Đăng nhập</a></li>
          <li class="nav-item d-none" data-auth="user">
            <span id="navUserName" class="me-lg-2"></span>
            <button class="btn btn-outline-light btn-sm ms-lg-2" onclick="logout()">Đăng xuất</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page section">
    <div class="container">
      <div id="messages"></div>
      <h1 class="page-title">Huấn luyện viên</h1>
      <p class="page-subtitle mb-4">Đặt lịch 1-1 với HLV phù hợp mục tiêu, lịch tập và ngân sách của bạn.</p>
      <div id="trainerList" class="row g-4"></div>
    </div>
  </main>

  <div class="modal fade" id="trainerBookingModal" tabindex="-1" aria-labelledby="trainerBookingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title fw-bold" id="trainerBookingModalLabel">Đặt lịch 1-1 với HLV</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="trainerBookingForm" onsubmit="submitTrainerBooking(event)">
          <div class="modal-body">
            <input type="hidden" id="trainerBookingTrainerId" name="trainer_id">
            <div class="mb-3">
              <label class="form-label fw-bold">HLV</label>
              <div id="trainerBookingTrainerName" class="alert alert-secondary py-2 mb-0"></div>
            </div>
            <div class="mb-3">
              <label for="trainerBookingMode" class="form-label fw-bold">Kiểu đăng ký</label>
              <select class="form-select" id="trainerBookingMode" name="booking_mode">
                <option value="single">Buổi lẻ 1-1</option>
                <option value="monthly">Theo tháng</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="trainerBookingStart" class="form-label fw-bold">Thời gian bắt đầu</label>
              <input class="form-control" id="trainerBookingStart" name="start_time" type="datetime-local" required>
            </div>
            <div class="mb-3">
              <label for="trainerBookingDuration" class="form-label fw-bold">Số ca đăng ký (1 ca = 1 tiếng)</label>
              <select class="form-select" id="trainerBookingDuration" name="duration_minutes">
                <option value="60" selected>1 ca (1 tiếng)</option>
                <option value="120">2 ca (2 tiếng)</option>
                <option value="180">3 ca (3 tiếng)</option>
                <option value="240">4 ca (4 tiếng)</option>
              </select>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label for="trainerBookingMonths" class="form-label fw-bold">Số tháng</label>
                <input class="form-control" id="trainerBookingMonths" name="months" type="number" min="1" max="12" value="1">
              </div>
              <div class="col-6">
                <label for="trainerBookingSessions" class="form-label fw-bold">Buổi / tuần</label>
                <input class="form-control" id="trainerBookingSessions" name="sessions_per_week" type="number" min="1" max="7" value="3">
              </div>
            </div>
            <div class="mb-0">
              <label for="trainerBookingNote" class="form-label fw-bold">Ghi chú</label>
              <textarea class="form-control" id="trainerBookingNote" name="note" rows="3" placeholder="Ví dụ: mục tiêu tập, chấn thương cần lưu ý..."></textarea>
            </div>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            <button type="submit" class="btn btn-brand">Đặt lịch 1-1</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="invoiceModal" tabindex="-1" aria-labelledby="invoiceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-dark text-white py-3">
          <h5 class="modal-title fw-bold" id="invoiceModalLabel">Thanh toán đặt lịch 1-1</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="invoiceModalContent"></div>
        <div class="modal-footer bg-light py-2">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Đóng</button>
          <button type="button" class="btn btn-brand btn-sm" id="btnConfirmPayment">Thanh toán</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js?v=1.0.1"></script>
</body>
</html>
